[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_TURNSTILE_SITE_KEY"

[functions]
  node_bundler = "esbuild"

[functions."scheduled-news"]
  timeout = 26

[functions."evaluate-alerts"]
  timeout = 26

[functions."inject-test-metrics"]
  timeout = 26

[functions."cleanup-activity-events"]
  timeout = 26

[functions."enqueue-alert-notifications"]
  timeout = 26

[functions."enqueue-schedule-reminders"]
  timeout = 26

[functions."send-telegram-notifications"]
  timeout = 26

[functions."retry-notification-dispatch"]
  timeout = 26

[functions."notification-cycle"]
  timeout = 26

[functions."telegram-webhook"]
  timeout = 26

[functions."send-telegram-test"]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scheduled trigger: runs daily at 05:00 UTC = 12:00 WIB (GMT+7)
# Fetch RSS feeds and upsert to Supabase. fetch-news.mjs only reads from DB.
[[scheduled_functions]]
  name = "scheduled-news"
  cron = "0 5 * * *"

[[scheduled_functions]]
  name = "evaluate-alerts"
  cron = "*/5 * * * *"

[[scheduled_functions]]
  name = "cleanup-activity-events"
  cron = "15 3 * * *"

[[scheduled_functions]]
  name = "enqueue-alert-notifications"
  cron = "*/2 * * * *"

[[scheduled_functions]]
  name = "enqueue-schedule-reminders"
  cron = "*/1 * * * *"

[[scheduled_functions]]
  name = "send-telegram-notifications"
  cron = "*/1 * * * *"

[[scheduled_functions]]
  name = "retry-notification-dispatch"
  cron = "*/2 * * * *"

[[scheduled_functions]]
  name = "notification-cycle"
  cron = "*/1 * * * *"
