[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_TURNSTILE_SITE_KEY"

[functions]
  node_bundler = "esbuild"

# --- Scheduled functions (runs daily at 05:00 UTC = 12:00 WIB) ---
[functions."scheduled-news"]
  timeout = 26
  # schedule = "0 5 * * *"

[functions."evaluate-alerts"]
  timeout = 26
  # schedule = "*/5 * * * *"

[functions."inject-test-metrics"]
  timeout = 26

[functions."cleanup-activity-events"]
  timeout = 26
  # schedule = "15 3 * * *"

[functions."enqueue-alert-notifications"]
  timeout = 26
  # schedule = "*/2 * * * *"

[functions."enqueue-schedule-reminders"]
  timeout = 26

[functions."send-telegram-notifications"]
  timeout = 26

[functions."retry-notification-dispatch"]
  timeout = 26
  # schedule = "*/2 * * * *"

# Main notification orchestrator: enqueue schedules + alerts, then send.
# Also callable via HTTP POST from the frontend after import/add/update.
[functions."notification-cycle"]
  timeout = 26
  # schedule = "*/5 * * * *"

[functions."create-admin-broadcast"]
  timeout = 26

[functions."reset-broadcast-history"]
  timeout = 26

[functions."telegram-webhook"]
  timeout = 26

[functions."send-telegram-test"]
  timeout = 26

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 404

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
